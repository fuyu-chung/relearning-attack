# prep_train.py
in_json: data/train_data.json
out_dir: out
forget_ratio: 0.2
max_train_tools: 250

# gen_yprime.py
forget_sft: out/forget_sft.jsonl
yprime_out: out/forget_sft_yprime.jsonl
model_path: lmsys/vicuna-7b-v1.3
max_new_tokens: 256
checkpoint_every: 50

# prep_eval.py
eval_raw: data/eval_simulated.json
eval_file: out/eval_simulated.jsonl

# eval_generate.py
output_file: out/generated_trace.jsonl
toolalpaca_model: TangQiaoYu/ToolAlpaca-7B

# eval_judge.py
judge_model: meta-llama/Meta-Llama-3.1-8B-Instruct
mmlu_samples: 20

retain_sft: out/retain_sft.jsonl
