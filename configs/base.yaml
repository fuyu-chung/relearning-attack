# prep_toolalpaca.py
in_json: data/train_data.json
out_dir: out
forget_ratio: 0.2

# gen_yprime.py
forget_sft: out/forget_sft.jsonl
yprime_out: out/forget_sft_yprime.jsonl
model_path: models/vicuna-7b
max_new_tokens: 256
checkpoint_every: 50

# eval_generate.py
eval_files:
  test: out/eval_simulated.jsonl
  forget: out/forget_sft.jsonl
  retain: out/retain_sft.jsonl
output_file: out/generated_traces.jsonl
toolalpaca_model: TangQiaoYu/ToolAlpaca-7B

# prep_eval.py
eval_raw: data/eval_simulated.json
eval_file: out/eval_simulated.jsonl

judge_model: meta-llama/Meta-Llama-3.1-8B-Instruct